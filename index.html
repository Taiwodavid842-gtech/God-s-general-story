          story: `Dr. Myles Munroe was one of the most influential Christian teachers on purpose, leadership, and the Kingdom of God. Through his books, conferences, and preaching, he encouraged millions of people to discover why God created them and to live lives of significance.

Early Life

Beginning His Ministry

His Books

Family Life

A Global Influence

Myles Munroe became a respected speaker to churches, universities, governments, and business leaders.

          story: `Martin Luther was a German monk, theologian, professor, and reformer whose courage and devotion to God's Word transformed Christianity. By standing firmly on the authority of Scripture, he became the central figure of the Protestant Reformation.

Early Life

Martin Luther was born on November 10, 1483, in Eisleben.

His father, Hans Luther, worked as a miner and hoped Martin would become a lawyer and bring honor to the family. Martin was an intelligent student and attended excellent schools before enrolling at the University of Erfurt, where he earned a master's degree.

His future seemed secure, but God had another plan.

The Thunderstorm That Changed His Life

In 1505, while returning to school, Luther was caught in a violent thunderstorm.

A bolt of lightning struck very close to him.

Terrified that he would die, he cried out: "Help me, Saint Anne! I will become a monk."

He survived the storm and kept his promise.

To the disappointment of his father, Luther entered an Augustinian monastery.

A Monk Searching for Peace

As a monk, Luther devoted himself to prayer, fasting, confession, and strict discipline.

He desperately wanted peace with God.

He confessed his sins repeatedly and tried every religious practice he knew, yet he still felt guilty and feared God's judgment.

He later admitted that no amount of effort gave him assurance of salvation.

Discovering the Gospel

Luther was ordained as a priest and later became a professor of Bible studies at the University of Wittenberg.

While studying the books of Romans, Galatians, and Psalms, he came to a life-changing realization.

Romans 1:17 says: "The just shall live by faith."

Luther understood that salvation is not earned through good works or religious rituals. Instead, it is received by God's grace through faith in Jesus Christ.

This discovery transformed his life and became the foundation of his teaching.

The Sale of Indulgences

At that time, some church leaders were selling indulgences—documents claimed to reduce punishment for sin.

A preacher named Johann Tetzel promoted them, leading many people to believe they could purchase forgiveness.

Luther believed this contradicted the Bible. He taught that forgiveness comes only through genuine repentance and faith in Christ.

The Ninety-Five Theses

On October 31, 1517, Luther wrote his famous Ninety-Five Theses, challenging the abuse of indulgences and calling for reform.

He posted them on the church door in Wittenberg, which served as a public notice board for academic discussion.

Thanks to the recently invented printing press, his ideas spread rapidly throughout Europe.

This event marked the beginning of the Protestant Reformation.

Standing Before the Emperor

Luther was summoned before the Diet of Worms in 1521.

He was ordered to withdraw his writings.

After careful consideration, Luther refused, declaring that his conscience was bound to the Word of God.

He is traditionally remembered for saying: "Here I stand. I can do no other. God help me. Amen."

Hidden for Safety

Marriage and Family

In 1525, Luther married Katharina von Bora, a former nun.

His Teachings

Martin Luther emphasized several key biblical truths: Salvation is by grace alone, received through faith alone. Christ alone is the Savior. Scripture alone is the highest authority. All glory belongs to God alone.

These principles became foundational teachings of the Protestant Reformation.

His Final Years

He died on February 18, 1546, in his hometown of Eisleben.

His final recorded words were: "We are beggars. This is true."

They reflected his conviction that salvation is entirely dependent on God's grace.

Lessons from Martin Luther's Life

1. God's Word Is the Final Authority — Always test teachings by Scripture.

4. One Person Can Change History — God used one faithful man to influence millions.

Conclusion

Martin Luther's life is a testimony that God can use one person who is willing to stand on the truth of His Word. His rediscovery of the biblical teaching of salvation by grace through faith reshaped Christian history and continues to influence believers around the world.

His story reminds us that true reformation begins when we return to Scripture, trust completely in Jesus Christ, and have the courage to obey God above all else.`,

          story: `Hudson Taylor is remembered as one of the greatest missionaries in Christian history. His life was a remarkable testimony of unwavering faith, complete dependence on God, and an unshakable passion to see people come to know Jesus Christ. He gave more than fifty years of his life to China and inspired the modern missionary movement.

Early Life

Hudson Taylor was born on May 21, 1832, in Barnsley, England.

Before he was born, his parents prayed that God would use their son as a missionary to China. They believed that if God gave them a son, they would dedicate him to His service.

As a child, Hudson grew up in a Christian home and heard many stories about missionaries. However, during his teenage years, he drifted away from God. He became more interested in worldly pursuits than spiritual things.

Everything changed when he was 17 years old.

His Conversion

One afternoon, while alone at home, Hudson picked up a Christian tract expecting to find an interesting story. Instead, he read about the finished work of Jesus Christ on the cross. When he came across the words "It is finished," he suddenly understood that Jesus had already paid the full price for humanity's sins. At that very moment, Hudson surrendered his life to Christ.

Unknown to him, at that exact time his mother, who was miles away, was praying earnestly for his salvation. Later she testified that God had assured her He had answered her prayer.

Preparing for God's Call

Soon after his conversion, Hudson became convinced that God was calling him to China. Rather than waiting until he arrived there, he began preparing himself immediately. He studied medicine, the Chinese language, the Bible, and missionary work. He also trained himself to trust God completely. Whenever he had little money, he refused to complain. Instead, he prayed and watched God provide.

These early experiences taught him one of the greatest lessons of his life: "God's work done in God's way will never lack God's supply."

The Dangerous Journey to China

In 1853, at the age of 21, Hudson sailed for China. The journey lasted nearly six months and was filled with danger. At one point, the ship became trapped near dangerous reefs after the wind stopped blowing. Death seemed certain. Hudson quietly gathered with others to pray. Shortly afterward, the wind began to blow again, carrying the ship safely away. This experience strengthened his confidence that God answers prayer.

Learning to Love the Chinese People

When Hudson arrived in China, he noticed that many missionaries remained separated from the local people. He believed this created unnecessary barriers to sharing the Gospel. Instead of expecting the Chinese to become like Europeans, Hudson chose to become like them. He learned to speak Chinese fluently, wore Chinese clothing, styled his hair like Chinese men, lived among the people, and respected their culture whenever it did not conflict with Scripture.

Many criticized him. Some even believed he was lowering the dignity of a missionary. Hudson simply replied that he wanted nothing to prevent people from hearing about Jesus.

Years of Suffering

Missionary life was far from easy. Hudson experienced serious illnesses, civil wars, poverty, loneliness, constant travel, opposition, and the deaths of several children. One of the greatest tragedies came when his beloved wife, Maria, died after years of faithful ministry. Although his heart was broken, Hudson continued trusting God. His faith did not depend on easy circumstances. It depended on the faithfulness of God.

The Birth of China Inland Mission

In 1865, while praying in England, Hudson felt burdened that millions living in inland China had never heard the Gospel. He founded the China Inland Mission. Unlike many mission organizations of the time, Taylor refused to ask people directly for financial support. Instead, he trusted God alone to provide. Many thought his approach was impossible. Yet God continually supplied workers, finances, and opportunities.

His Influence

Hudson Taylor served China for more than fifty years. By the time of his death, over 800 missionaries had joined the China Inland Mission. Schools and hospitals had been established. Tens of thousands of Chinese people had heard the Gospel. Churches had been planted across many provinces. His methods influenced missionary work around the world.

His Final Days

In 1905, while still serving in China, Hudson Taylor became ill. On June 3, 1905, he peacefully entered the presence of the Lord in Changsha, China. He was buried in China—the nation he had loved and served for over half a century.

Lessons from Hudson Taylor's Life

1. God Honors Complete Dependence — Hudson trusted God in every situation, and God proved faithful.
2. Prayer Changes Circumstances — His ministry was built on prayer rather than human strength.
3. Love People Enough to Reach Them — He removed cultural barriers so others could hear the Gospel.
4. Obedience Is Greater Than Comfort — He sacrificed comfort, wealth, and safety to obey God's call.
5. Christ Is the Secret of the Christian Life — Victory comes not through self-effort but by abiding in Jesus.

Conclusion

Hudson Taylor's story is not simply the story of a missionary—it is the story of a man who believed God completely. He surrendered his dreams, trusted God's promises, embraced hardship for the sake of the Gospel, and left a legacy that continues to inspire believers worldwide.

His life reminds us that ordinary people become extraordinary instruments in God's hands when they trust Him fully, obey Him wholeheartedly, and live for His glory alone.`,

          story: `Augustine of Hippo is one of the most influential Christian leaders in history. His remarkable journey from a rebellious young man to a devoted follower of Christ is a powerful testimony of God's grace and transforming power.

Early Life

Augustine was born on November 13, 354, in Thagaste. His father, Patricius, was not a Christian for most of his life, but his mother, Monica, was a devoted believer. Monica prayed earnestly for Augustine's salvation for many years. Although Augustine was highly intelligent and excelled in his studies, he lived a sinful and worldly lifestyle as a young man. He pursued pleasure, fame, and success while ignoring God's call.

Searching for Truth

Augustine became a respected teacher of rhetoric, but despite his achievements, he felt empty inside. He explored different philosophies and religious ideas, hoping to find meaning and peace. Yet nothing truly satisfied his heart. His restless search showed that human wisdom alone cannot fill the deepest needs of the soul.

A Mother's Prayers

Throughout Augustine's years of rebellion, Monica never stopped praying for her son. She believed that God would answer her prayers, even when Augustine seemed far from the truth. Her faithful prayers became one of the greatest examples of persistent intercession in Christian history.

The Moment That Changed Everything

Augustine wrote many important works, including Confessions — the story of his conversion and spiritual journey, and The City of God — a defense of Christianity and a reflection on God's eternal kingdom. These books remain among the most influential works in Christian literature.

Lessons from Augustine's Life

      // ----- Render current general data into the page -----
      function renderGeneral(generalData) {
        // Set general name
        document.getElementById('generalName').textContent = generalData.name;
        
        // Set subtitle if available
        const subtitleElement = document.getElementById('generalSubtitle');
        if (generalData.subtitle) {
          subtitleElement.textContent = generalData.subtitle;
          subtitleElement.style.display = 'block';
        } else {
          subtitleElement.style.display = 'none';
        }
        
        // Set story text
        document.getElementById('storyText').textContent = generalData.story;
        
        // Handle image: try to load image, if fails or empty show fallback icon
        const imageFrame = document.getElementById('imageFrame');
        imageFrame.innerHTML = ''; // clear previous
        
        if (generalData.image && generalData.image.trim() !== '') {
          const img = document.createElement('img');
          img.src = generalData.image;
          img.alt = generalData.name;
          img.onerror = function() {
            // If image fails to load, show fallback icon
            imageFrame.innerHTML = '<i class="fas fa-user-circle fallback-icon"></i>';
          };
          imageFrame.appendChild(img);
        } else {
          // No image provided, show fallback icon
          imageFrame.innerHTML = '<i class="fas fa-user-circle fallback-icon"></i>';
        }
        
        // Render quotes (up to 4 for Dr. Myles Munroe, others will show first 3)
        const quotesContainer = document.getElementById('quotesContainer');
        quotesContainer.innerHTML = ''; // clear
        
        if (generalData.quotes && Array.isArray(generalData.quotes)) {
          const quotesToShow = generalData.quotes.slice(0, 4);
          quotesToShow.forEach(quote => {
            const quoteCard = document.createElement('div');
            quoteCard.className = 'quote-card';
            quoteCard.innerHTML = `
              <i class="fas fa-quote-right"></i>
              <span class="quote-text">${escapeHTML(quote)}</span>
            `;
            quotesContainer.appendChild(quoteCard);
          });
        }
        
        // Update date display
        const dateElement = document.getElementById('currentDate');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateElement.textContent = new Date().toLocaleDateString(undefined, options);
      }

      // simple escape to avoid XSS
      function escapeHTML(str) {
        return String(str).replace(/[&<>"']/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          if (m === "'") return '&#039;';
          return m;
        });
      }

      // ----- Function to load today's story (always Dr. Myles Munroe) -----
